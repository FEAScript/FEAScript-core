<html>
  <head>
    <title>FEAScript Example: Heat Conduction 1D Wall</title>
    <meta charset="UTF-8" />
    <!-- Link to the CSS files -->
    <link href="https://feascript.com/feascript-website.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <!-- Import the Math.js library for mathematical operations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.12.0/math.min.js"></script>
    <!-- Import map for VTK.js modules -->
    <script type="importmap">
      {
        "imports": {
          "@kitware/vtk.js/": "https://cdn.jsdelivr.net/npm/@kitware/vtk.js@32.12.0/",
          "gl-matrix": "https://esm.sh/v135/gl-matrix@3.4.3",
          "d3-scale": "https://esm.sh/v135/d3-scale@4.0.2",
          "fast-deep-equal": "https://esm.sh/v135/fast-deep-equal@3.1.3",
          "seedrandom": "https://esm.sh/v135/seedrandom@3.0.5",
          "spark-md5": "https://esm.sh/v135/spark-md5",
          "fflate": "https://esm.sh/v135/fflate",
          "utif": "https://esm.sh/v135/utif",
          "webworker-promise": "https://esm.sh/v135/webworker-promise",
          "xmlbuilder2": "https://esm.sh/v135/xmlbuilder2",
          "globalthis": "data:text/javascript,export default function(){return globalThis}"
        }
      }
    </script>
  </head>

  <body>
    <h2>Heat Conduction 1D Wall</h2>

    <!-- Container element where the solution plot will be rendered -->
    <div id="resultsCanvas"></div>

    <script type="module">
      // Import FEAScript library
      import { FEAScriptModel, plotSolutionVtk, printVersion } from "https://core.feascript.com/dist/feascript.esm.js";
      // import { FEAScriptModel, plotSolutionVtk, printVersion } from "../../../src/index.js";

      window.addEventListener("DOMContentLoaded", async () => {
        console.log("FEAScript Version:", printVersion);

        // Create a new FEAScript model
        const model = new FEAScriptModel();

        // Select physics/PDE
        model.setModelConfig("heatConductionScript");

        // Define mesh configuration
        model.setMeshConfig({
          meshDimension: "1D",
          elementOrder: "linear",
          numElementsX: 10,
          maxX: 0.15,
        });

        // Define boundary conditions
        model.addBoundaryCondition("0", ["convection", 1, 25]); // Left boundary
        model.addBoundaryCondition("1", ["constantTemp", 5]); // Right boundary

        // Set solver method
        model.setSolverMethod("lusolve");

        // Solve the problem
        const result = model.solve();

        // Print results to console
        console.log(`Number of nodes: ${result.nodesCoordinates.nodesXCoordinates.length}`);
        console.log("Solution vector:", result.solutionVector);

        // Plot the solution as a 1D line plot
        await plotSolutionVtk(model, result, "line", "resultsCanvas");
      });
    </script>
  </body>
</html>
